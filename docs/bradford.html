marry Dorothy May. Three years later we have a son, John, who answers his Dutch nurse before he answers me.", "The Dutch are kind. They are also quietly taking my children away from me."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_5"}], "image_brief": "A canal in Leiden. Tall narrow brick houses with stepped gables. Dutch boys in wooden shoes playing along the water. The Separatist congregation walks down the street in plain English wool — visibly different from the people around them. Painted, soft afternoon light.", "timeline": {"active": [], "pulsing": ["1608", "1608"]}, "gif": null, "image": "images/hub/plymouth_pilgrims.jpg"}, {"id": "slide_5", "type": "story", "title": "The Children Speak Dutch", "body": ["My son speaks Dutch better than English. He prays in Dutch when he forgets I am listening. Our young men join Dutch militias; our young women marry Dutch boys; our church is fading.", "We came here for our faith. If we stay, our grandchildren will be Dutchmen who happened to have an English grandfather."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_6"}], "image_brief": "A small parlor. Bradford at a table with a Bible. A boy of seven plays in the corner with a Dutch friend, both speaking Dutch. Dorothy stands at the window, half-lit. Bradford's hands are folded over the page but his eyes are on the children.", "timeline": {"active": ["1608"], "pulsing": []}, "gif": null, "image": "images/hub/plymouth_pilgrims.jpg"}, {"id": "slide_6", "type": "decision", "title": "Decision: The Holland Years", "body": ["Brewster says we cannot stay another generation. Some elders push for Amsterdam; some young men whisper that the heat in England may have died down.", "", "What do I do?"], "key_terms": [], "buttons": [{"text": "STAY THE COURSE IN LEIDEN. PREPARE FOR A LONGER JOURNEY.", "target": "slide_7"}, {"text": "MOVE THE CONGREGATION TO AMSTERDAM. THE ENGLISH CHURCH THERE WILL TAKE US IN.", "target": "slide_6a"}, {"text": "RISK A QUIET RETURN TO ENGLAND. SEE IF THE OFFICERS HAVE FORGOTTEN US.", "target": "slide_6b"}], "image_brief": "A Leiden street at twilight. Brewster on one side, holding a sealed letter from Amsterdam. Dorothy at Bradford's elbow, pulling a shawl tighter. A Dutch official in a velvet hat at the end of the lane. Three roads visibly diverge — north to Amsterdam, east toward the docks home to England, west toward the deeper interior.", "timeline": {"active": [], "pulsing": ["1608"]}, "gif": null, "image": "images/bradford/king_james_i_decritz.jpg"}, {"id": "slide_6a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["We pack the wagons for Amsterdam. The English congregation welcomes us at first.", "Within a year their elders quarrel with ours over communion and leadership. Our Scrooby congregation is folded into someone else's argument.", "By 1612 the Amsterdam church has split three ways. Brewster goes home to die. I never see England's flag again.", "Real history: the Amsterdam congregation fractured repeatedly between 1608 and 1620 over baptism and church discipline. Pilgrim leaders chose Leiden in 1609 specifically to avoid this — almost no Separatist congregation that joined Amsterdam survived a generation."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: the Yzma \"WRONG LEVERRR\" GIF — `https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif`. Bangers headline overlay top: **\"WRONG LEVERRRRR!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1608"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_6b", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["We slip back across the Channel in twos and threes. I tell myself the heat has died down.", "It has not. The High Commission has been hunting Separatists for two years.", "Brewster is arrested at the dock; I am arrested at my mother's gate. The Leiden press never gets built.", "Real history: Archbishop Bancroft's 1604 Canons made Separatist worship prosecutable, and the High Commission tracked exiled Pilgrims for years. Brewster himself spent 1619 hiding from English agents in Leiden — Pilgrims who returned were almost always caught."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Charlie Brown \"AAUGH!\" GIF embedded via Tenor — search `charlie brown aaugh gif`. Bangers headline overlay top: **\"AAUGH!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1608"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_7", "type": "story", "title": "The Plan", "body": ["It is 1619. Eleven years of saving have brought us to the Adventurers' parlor in London.", "The Virginia Company grants us a charter near the Hudson. We must pay our way by going into debt to London merchants for seven years.", "The terms are hard. The terms are the only terms there are."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_8"}], "image_brief": "A long candlelit table. Brewster, Bradford, and the elders of the congregation around it. A folded charter on the table — the Virginia Company seal visible. A small map of the New World. Faces serious. The candle burns low.", "timeline": {"active": [], "pulsing": ["1619", "1619"]}, "gif": null, "image": "images/bradford/king_james_i_decritz.jpg"}, {"id": "slide_8", "type": "decision", "title": "Decision: The Charter Question", "body": ["The manifest must be full or no ship sails. The Adventurers have rounded up forty more passengers — Strangers, not Saints — and Brewster is uneasy at sharing a charter with them.", "", "What do I do?"], "key_terms": [], "buttons": [{"text": "ACCEPT. WE SAIL WITH THE STRANGERS. THE LORD WILL SORT US OUT.", "target": "slide_9"}, {"text": "REFUSE. CHARTER A SECOND SHIP OURSELVES. SAINTS ONLY.", "target": "slide_8a"}, {"text": "WAIT ANOTHER YEAR. NEGOTIATE BETTER TERMS WITH LONDON.", "target": "slide_8b"}], "image_brief": "The same candlelit table, an hour later. The London merchants' agent has departed. Brewster sits with his hand over the open charter. A second sheet of paper bears another company's seal — \"Strangers\" — passengers the Adventurers want bundled with us to fill the manifest. Dorothy stands by the window with John.", "timeline": {"active": ["1619"], "pulsing": []}, "gif": null, "image": "images/bradford/delfshaven_willaerts.jpg"}, {"id": "slide_8a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I refuse the Strangers. We charter the Speedwell to keep Saints separate.", "She leaks. Twice we put back to port. By the third return our money is gone and the Atlantic is closed for winter.", "Half our families go home to Leiden. The Adventurers cancel our charter.", "Real history: the Speedwell really did leak, and the Pilgrims transferred to the Mayflower alone. There is no evidence the Adventurers would have funded a Saints-only voyage — the Pilgrims survived because they accepted the mixed manifest."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Bobby Boucher tackle GIF embedded via Tenor — search `bobby boucher tackle waterboy gif`. Bangers headline overlay top: **\"MAMA SAYS WINTER IS THE DEVIL!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1619"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_8b", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I tell the Adventurers we will sail next year — better terms, better season.", "By spring 1620 they have given our charter to a different congregation. By 1657 our generation is dead, and there is no Plymouth.", "We are still in Leiden, still arguing terms. The world sails without us.", "Real history: religious dissenter movements that wait for perfect conditions never sail. Other Separatist congregations debated and dissolved — the Pilgrims sailed in 1620 with bad terms because the alternative was no terms at all."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: the \"Both? Both. Both is good.\" Road to El Dorado GIF embedded via Tenor — search `both is good el dorado gif`. Bangers headline overlay top: **\"WAITED TOO LONG.\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1619"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_9", "type": "story", "title": "The Mayflower", "body": ["Summer 1620 — the Speedwell leaks twice. We transfer to the Mayflower alone, a hundred-foot ship built for wine.", "September, 1620. We board at Plymouth, England — one hundred two passengers, Saints and Strangers mixed, half of us women and children.", "We are families. That, I think, is the difference that will matter most."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_10"}], "image_brief": "A three-masted merchant ship at a Plymouth, England dock. Crates being loaded. Families saying goodbye on the pier. A child holding a wooden duck. The autumn sky is gray and the tide is high. Painted-engraving style.", "timeline": {"active": [], "pulsing": ["1620", "1620"]}, "gif": null, "image": "images/bradford/embarkation_pilgrims_weir.jpg"}, {"id": "slide_10", "type": "story", "title": "Sixty-Six Days", "body": ["Six weeks becomes nine. A main beam cracks midway across; the crew braces it with an iron screw one of our passengers brought from Holland. Without that screw, we would not be writing this.", "One man falls overboard and is hauled back. One baby — Oceanus Hopkins — is born at sea. One man dies. The math, so far, is not unkind."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_11"}], "image_brief": "Cutaway view of the Mayflower's cramped lower deck during a storm. Families packed shoulder to shoulder, lanterns swinging, water seeping between planks, a man being sick into a bucket. A pregnant woman steadying herself on a beam. The angle of the deck is wrong — the ship is heeled hard.", "timeline": {"active": [], "pulsing": []}, "gif": null, "image": "images/bradford/mayflower_at_sea.jpg"}, {"id": "slide_11", "type": "story", "title": "Cape Cod, Not Virginia", "body": ["November ninth. Land — but far north of our charter, and the shoals between here and the Hudson have broken better ships than ours.", "We will have to settle here, on land the Virginia Company has no charter for. I do not yet know what that means. The Strangers know exactly."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_12"}], "image_brief": "The Mayflower at anchor in a gray bay. Sand dunes on shore, low scrub pine, no settlement, no people, no Virginia. The captain points at a chart. Bradford and the elders look out at a coastline that is not where they meant to be.", "timeline": {"active": [], "pulsing": ["1620", "1620"]}, "gif": null, "image": "images/bradford/mayflower_at_sea.jpg"}, {"id": "slide_12", "type": "decision", "title": "Decision: Where Do We Land?", "body": ["The captain wants to drop anchor here. Some of our men want to push south to the Hudson; a few Strangers talk of taking the helm by force.", "", "What do I do?"], "key_terms": [], "buttons": [{"text": "STAY WHERE WE ARE. WE WILL FIND HARBOR ON THIS COAST.", "target": "slide_13"}, {"text": "ORDER THE CAPTAIN SOUTH TO THE HUDSON, AS THE CHARTER SAYS.", "target": "slide_12a"}, {"text": "LET THE STRANGERS RUSH THE QUARTERDECK. THE CAPTAIN HAS LOST OUR TRUST.", "target": "slide_12b"}], "image_brief": "The quarterdeck. Captain Jones with a chart unrolled, tapping the southern shoals with a finger. Brewster at his shoulder. A handful of the loudest Strangers behind them. The wind is rising. The light is the color of pewter.", "timeline": {"active": ["1620"], "pulsing": []}, "gif": null, "image": "images/bradford/mayflower_in_plymouth_harbor_halsall.jpg"}, {"id": "slide_12a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I order Captain Jones south to the Hudson. The charter says Virginia.", "We run straight into the Pollock Rip. The keel breaks before sunrise.", "Half drown in the surf. The rest stagger ashore with no provisions and no shelter. No Plymouth.", "Real history: Captain Jones turned back from the Pollock Rip in November 1620 because pushing through would have wrecked the ship. The Cape Cod landing was navigationally necessary — and the Mayflower Compact was invented to handle the legal problem of being outside Virginia jurisdiction."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Bobby Boucher tackle GIF — search `bobby boucher tackle waterboy gif`. Bangers headline overlay top: **\"MAMA SAYS THE SEA IS THE DEVIL!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1620"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_12b", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I let the Strangers rush the quarterdeck. Captain Jones is shoved against the rail, three crewmen knifed.", "The Mayflower turns home, manned half by mutineers. We arrive in England in chains and stand trial for piracy.", "Real history: Captain Jones was a hired master under Virginia Company authority — mutiny on a chartered crossing was a capital crime under James I. The Compact existed precisely to prevent this, by binding Strangers and Saints to a civil order before anyone stepped ashore."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Charlie Brown \"AAUGH!\" GIF embedded via Tenor — search `charlie brown aaugh gif`. Bangers headline overlay top: **\"AAUGH!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1620"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_13", "type": "story", "title": "The Mutiny on the Deck", "body": ["A Stranger named Stephen Hopkins stands on the deck and says the words I feared:", "\"We are not in Virginia. The Company's laws do not reach this coast. When we step ashore, every man does as he pleases.\"", "Tomorrow we will be ashore, and tomorrow there will be no King and no governor and no church."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_14"}], "image_brief": "The Mayflower's main deck. Saints on one side, Strangers on the other, a clear line between them. One Stranger — a tall man, hand on the hilt of a knife — is shouting at Brewster. Bradford stands behind Brewster. The captain watches from the quarterdeck, arms folded.", "timeline": {"active": [], "pulsing": []}, "gif": null, "image": "images/plymouth_shared/landing_pilgrims_bacon.jpg"}, {"id": "slide_14", "type": "decision", "title": "Decision: How Do I Hold This Together?", "body": ["If I do nothing, the Strangers walk off this ship as forty-one little kings and the colony is dead by Christmas.", "What do I do?"], "key_terms": [], "buttons": [{"text": "WRITE A COMPACT — EVERY ADULT MAN BINDS HIMSELF TO THE LAWS WE TOGETHER MAKE", "target": "slide_15"}, {"text": "ORDER THE SAINTS TO LAND FIRST AND HOLD THE BEACH AGAINST THE STRANGERS", "target": "slide_14a"}, {"text": "GIVE UP. TURN THE SHIP HOME TO ENGLAND.", "target": "slide_14b"}], "image_brief": "Bradford alone in the captain's cabin at night, ink and paper before him on a small table. The lantern is low. Through the small window, the deck above is lit by torches. Dorothy stands in the cabin doorway, watching.", "timeline": {"active": [], "pulsing": []}, "gif": null, "image": "images/plymouth_shared/mayflower_compact_period.jpg"}, {"id": "slide_14a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I order the Saints onto the beach first, muskets ready. The Strangers wade ashore and find armed men between them and the supplies.", "Muskets fire on the sand before the second day. The wounded freeze in their blankets that first week.", "Half the colony is killed by the other half before winter. No Compact. No Plymouth.", "Real history: every English colony that began in armed conflict — Roanoke, early Jamestown factions, Popham — failed within two years. Plymouth survived because the Compact bound Strangers and Saints before anyone stepped ashore."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Bobby Boucher tackle GIF embedded via Tenor — search `bobby boucher tackle waterboy gif`. Bangers headline overlay top: **\"MAMA SAYS WINTER IS THE DEVIL!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1620"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_14b", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I order the Mayflower home. The Saints kneel and weep. Brewster will not look at me.", "Twelve years in Holland for nothing. We arrive in England in February 1621, the colony abandoned.", "History writes us off as the second Roanoke.", "Real history: every failed English colony before Plymouth — Roanoke, Sagadahoc, early Jamestown — turned back or starved within two years. Bradford wrote that giving up the New World \"would not be a sufficient excuse before God.\" Turning the ship around ends the entire Pilgrim story."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Charlie Brown \"AAUGH!\" GIF embedded via Tenor — search `charlie brown aaugh gif`. Bangers headline overlay top: **\"AAUGH!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1620"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_15", "type": "decision", "title": "Decision: How Do I Word This?", "body": ["The words on this page matter more than I ever thought words could. Too narrow and the Strangers will not sign; too broad and the Saints will not.", "Hopkins is at the door, waiting.", "", "What do I do?"], "key_terms": [], "buttons": [{"text": "WRITE IT BROAD. SAINTS AND STRANGERS BOTH BIND THEMSELVES TO LAWS WE TOGETHER MAKE.", "target": "slide_16"}, {"text": "NEGOTIATE AMENDMENTS WITH HOPKINS BEFORE INK DRIES. LET HIM HELP WORD IT.", "target": "slide_16"}, {"text": "REFUSE TO INCLUDE THE STRANGERS. ONLY SAINTS SIGN.", "target": "slide_15a"}], "image_brief": "Same cabin. The compact draft is half-written in Bradford's hand. Brewster looks over his shoulder. A Stranger — Stephen Hopkins, the loudest one — stands at the cabin door, arms crossed, listening.", "timeline": {"active": ["1620"], "pulsing": []}, "gif": null, "image": "images/plymouth_shared/mayflower_compact_period.jpg"}, {"id": "slide_15a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I write the Compact for Saints alone. Forty-one Strangers stand at the rail and watch.", "They walk off the ship the next morning as forty-one little kings, exactly as Hopkins promised. They build huts across the brook and answer to no one.", "By spring, half the colony is shooting at the other half.", "Real history: the Compact's genius was binding Strangers as well as Saints. Its first signers were a deliberate mix — Saints, Strangers, servants, all sworn to the same body politic. Strip the Strangers from the page and you strip the precedent from history."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Yzma \"WRONG LEVERRR\" GIF — `https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif`. Bangers headline overlay top: **\"WRONG LEVERRRRR!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": ["1620"], "pulsing": []}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_16", "type": "story", "title": "The Mayflower Compact", "body": ["*In the name of God, Amen. We whose names are underwritten… do by these presents solemnly and mutually, in the presence of God and of one another, covenant and combine ourselves together into a civil Body Politick…*", "", "Forty-one of us sign. Saints and Strangers. The first written agreement on this coast that says: the people who live here will obey the laws the people who live here together make.", "", "No king signs this page. No bishop signs this page. We sign this page.", "", "*(BROAD path closing line):* Hopkins signs first.", "*(NEGOTIATED path closing line):* Hopkins signs grudgingly, third from last."], "key_terms": [{"name": "Mayflower Compact", "def": "A short written agreement signed November 11, 1620, by 41 male passengers in the Mayflower's cabin. It bound everyone aboard — Saints AND Strangers — to obey laws they would together make. It is the first written framework for self-government written on what becomes United States soil."}, {"name": "Civil Body Politic", "def": "The phrase from the Compact meaning *a community that governs itself by its own consent*, not by a king's command. This idea — that legitimate government comes from the people who agree to be governed — runs straight through the Declaration of Independence (1776) and the U.S. Constitution (1787)."}, {"name": "Self-Government", "def": "The idea that a community can make its own laws and elect its own leaders without a king. The Compact is the first practical test of this idea on this coast."}], "buttons": [{"text": "STEP ASHORE", "target": "slide_17"}], "image_brief": "A parchment, full-bleed in the upper half of the slide. The text of the Compact is **baked into the PNG** in `IM Fell English` per the parchment-fix pattern. A single quill rests across the bottom of the page. Forty-one signatures crawl down the right margin: John Carver, William Bradford, Edward Winslow, William Brewster, Isaac Allerton, Myles Standish, John Alden… Bradford's signature is the second from the top.", "timeline": {"active": ["1620"], "pulsing": ["1620"]}, "gif": null, "image": "images/bradford/compact_signing_ferris.jpg"}, {"id": "slide_17", "type": "story", "title": "First Winter", "body": ["We came ashore in December with no shelter and no fresh food. Our lungs had spent twelve years in lowland Holland.", "By the time the snow melts, fifty-two of the one hundred two of us are in the ground. Half the ship.", "Dorothy is one of them. She falls from the deck of the Mayflower while I am ashore. They tell me it was an accident — I have never written what I think it was."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_18"}], "image_brief": "A half-built palisade in heavy snow. Three small huts, smoke from one chimney. A man in a long coat carries a body wrapped in a blanket toward a row of fresh graves at the edge of the woods. Snow everywhere. Painted-engraving style, almost monochrome. No close-ups of faces — this is grief at a respectful distance.", "timeline": {"active": ["1620"], "pulsing": ["1620"]}, "gif": null, "image": "images/plymouth_shared/landing_pilgrims_bacon.jpg"}, {"id": "slide_18", "type": "decision", "title": "Decision: What Do I Tell the Colony About Dorothy?", "body": ["Dorothy is two days in the ground. The colony is bleeding. Carver is failing. If I am elected governor when he dies, I cannot be elected as a man who is hiding what happened to his own wife.", "Some elders are telling me to write it down as an accident and move on. Brewster says to tell the truth, plainly. A few neighbors are whispering it was something darker.", "", "What do I do?"], "key_terms": [], "buttons": [{"text": "RECORD HER DEATH AS AN ACCIDENT. CARRY ON WITH THE COLONY'S WORK.", "target": "slide_19"}, {"text": "STEP DOWN FROM CONSIDERATION FOR GOVERNOR. I CANNOT LEAD WHILE GRIEVING.", "target": "slide_19"}, {"text": "HIDE HER DEATH ENTIRELY. DO NOT WRITE IT IN THE ROSTER.", "target": "slide_18a"}], "image_brief": "A small dim room in the half-built common house. A single candle. Bradford at a desk with the colony's roster open in front of him. Carver — the governor at this moment — sits across from him, gaunt with fever, the man who will himself be in the ground inside a month. Bradford's hand hovers over Dorothy's name on the page.", "timeline": {"active": ["1620"], "pulsing": []}, "gif": null, "image": "images/bradford/bradford_portrait.jpg"}, {"id": "slide_18a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I leave Dorothy's name on the supply roster. I tell myself I will deal with it after spring planting.", "Three weeks later a Stranger sees her ration drawn but never delivered.", "By April, Plymouth's whisper is that the man who would be governor is a liar before God. They elect Isaac Allerton instead — and by then no one trusts the chronicler to tell it straight.", "Real history: Bradford's authority came from his reputation as a truthful chronicler. A lie about a household death, in a community of one hundred souls, would have ended his political career inside a year."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Charlie Brown \"AAUGH!\" GIF embedded via Tenor — search `charlie brown aaugh gif`. Bangers headline overlay top: **\"AAUGH!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1620"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_19", "type": "decision", "title": "Decision: Eat the Seed Corn?", "body": ["The chest in front of me holds the seed corn. We took it from a covered cache on a Wampanoag hill in November. We meant to repay it as soon as we could find someone to repay.", "We are starving. Children are starving. If I open this chest, we eat for a week.", "If I do not open this chest, we plant in April. If we plant in April, we eat in October."], "key_terms": [], "buttons": [{"text": "KEEP THE CHEST CLOSED. WE PLANT IN APRIL.", "target": "slide_20"}, {"text": "OPEN THE CHEST. THE CHILDREN COME FIRST.", "target": "slide_19a"}], "image_brief": "A wooden chest, half-open, full of dried corn kernels. A few of the surviving colonists stand around it — gaunt, hungry. A child reaches a small hand toward the kernels. Bradford stands at the chest with a key.", "timeline": {"active": ["1620"], "pulsing": []}, "gif": null, "image": "images/bradford/bradford_portrait.jpg"}, {"id": "slide_19a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I open the chest. The children eat. We are alive in March.", "April comes. There is nothing to plant. May comes. There is nothing to plant.", "By the next winter, the ones who survived the first winter are in the same ground as the ones who didn't.", "Real history: the seed corn taken from a Wampanoag cache in November 1620 was the foundation of the 1621 harvest. Without spring planting in mound-and-fish style, no English colony in New England survived — Sagadahoc starved in 1608 for exactly this reason."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: the Yzma \"WRONG LEVERRR\" GIF embedded via Tenor — `https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif`. Bangers headline overlay top: **\"WRONG LEVERRRRR!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1620"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_20", "type": "story", "title": "Samoset", "body": ["March, 1621. Half of us are dead. The other half are weak.", "A man walks out of the trees, calm and alone. He raises a hand.", "He says — in English — *\"Welcome, Englishmen.\"*", "His name is Samoset, an Abenaki from further north. He learned our language from English fishermen on the Maine coast."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_21"}], "image_brief": "A clearing at the edge of the half-built settlement. A tall Abenaki man, alone, walking calmly out of the woods toward the gate. He is unarmed and unhurried. The colonists stand in a ragged line, muskets half-raised, unsure. The morning light is gentle.", "timeline": {"active": [], "pulsing": ["1621", "1621"]}, "gif": null, "image": "images/plymouth_shared/samoset_interview.jpg"}, {"id": "slide_21", "type": "decision", "title": "Decision: How Do We Meet Him?", "body": ["Samoset says there is another man — Tisquantum, called Squanto — who speaks our language even better. Squanto's people lived where we now stand, until the sickness took them.", "Samoset can bring Squanto. He can bring Massasoit, sachem of the Wampanoag.", "", "What do I do?"], "key_terms": [], "buttons": [{"text": "OFFER FOOD AND HOSPITALITY. ASK HIM TO BRING THE OTHERS.", "target": "slide_22"}, {"text": "SEIZE HIM AS A HOSTAGE. THE FRENCH DID THIS WITH SUCCESS.", "target": "slide_21a"}, {"text": "SEND HIM AWAY. WE DO NOT TRUST A STRANGER WHO SPEAKS OUR LANGUAGE.", "target": "slide_21b"}], "image_brief": "Samoset sits on a low stool in the half-finished common house. The colonists stand around him, uncertain. Captain Standish has his hand on his sword belt. Brewster has his hand on a Bible. Bradford stands between them.", "timeline": {"active": ["1621"], "pulsing": []}, "gif": null, "image": "images/plymouth_shared/samoset_interview.jpg"}, {"id": "slide_21a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["Standish ties Samoset's hands. I tell myself the French held Indian hostages and lived.", "Word travels fast in the woods. Squanto never comes. Massasoit never comes.", "The Narragansett — who outnumber us forty to one — come in the fall with arrows wrapped in snake-skin.", "No corn lessons. No alliance. No Thanksgiving. No chronicle.", "Real history: Massasoit's alliance with the Pilgrims was driven by Wampanoag losses to the 1616–19 epidemic and fear of the Narragansett. Seizing Samoset would have signaled to every nation in New England that the English were untrustworthy."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Bobby Boucher tackle GIF embedded via Tenor — search `bobby boucher tackle waterboy gif`. Bangers headline overlay top: **\"MAMA SAYS WINTER IS THE DEVIL!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": [], "pulsing": ["1621"]}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_21b", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I send Samoset away. He raises a hand and walks back into the trees.", "Neither he nor Squanto nor Massasoit comes back. April brings only more graves.", "We try to plant English wheat; the kernels rot. The deer eat what survives.", "We do not last to August.", "Real history: Squanto's knowledge of this exact coast — where to plant, when the eels ran, how corn-bean-squash mounds worked — was the only thing keeping the colony alive. Turning Samoset away closed the only door to that knowledge."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: the \"Both? Both. Both is good.\" Road to El Dorado GIF embedded via Tenor — search `both is good el dorado gif`. Bangers headline overlay top: **\"WE TURNED HIM AWAY.\"** in `bone-white` with 2px black stroke.", "timeline": {"active": ["1621"], "pulsing": []}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_22", "type": "story", "title": "Squanto", "body": ["Squanto's English is better than mine in places. He learned it in London.", "His village stood on the same ground we are building on. His people are gone — a sickness, four years before we landed.", "He looks at our half-buried huts and our gaunt children. He says: *\"I will show you how to plant.\"*"], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_23"}], "image_brief": "Squanto stands in the same common house, days later. He is roughly Bradford's age, wearing a mix of Wampanoag and English garments — a wool English coat over deerskin leggings. His expression is steady and tired. Behind him, through the door, Samoset waits. Painted-engraving style.", "timeline": {"active": [], "pulsing": ["1621", "1621"]}, "gif": null, "image": "images/bradford/squanto_teaching_corn.jpg"}, {"id": "slide_23", "type": "decision", "title": "Decision: Do I Trust Squanto?", "body": ["Standish says no man learns London English by accident. He says Squanto could be a Spanish agent, an English company spy, or a Wampanoag scout pretending kindness to count our muskets.", "Brewster says God sometimes sends the answer in a form we did not pray for.", "Squanto is still waiting in the clearing.", "", "What do I do?"], "key_terms": [], "buttons": [{"text": "TRUST HIM. INVITE HIM IN. WE HAVE NO BETTER OFFER.", "target": "slide_24"}, {"text": "SEND WORD TO MASSASOIT FIRST. CONFIRM SQUANTO'S STORY BEFORE WE LET HIM TEACH US.", "target": "slide_24"}, {"text": "REFUSE THE HELP. WE WILL LEARN ON OUR OWN.", "target": "slide_23a"}], "image_brief": "Bradford and Brewster in a half-built doorway, watching Squanto wait alone in the snow-melt clearing outside. Standish is at the elbow, suspicious. A few colonists at the wall, hopeful. Squanto's posture is patient. He has been waiting like this a long time, in many places.", "timeline": {"active": ["1621"], "pulsing": []}, "gif": null, "image": "images/bradford/squanto_teaching_corn.jpg"}, {"id": "slide_23a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I refuse Squanto's help. I tell Brewster the Lord will provide. Brewster does not answer.", "We plant English wheat with no fish underneath. The kernels rot. The deer eat what survives.", "By the second winter, the half of us standing in March are not standing in November. The colony fails by Christmas 1622.", "Real history: every English colony in the Northeast that refused Native agriculture starved within two years — Sagadahoc, early Jamestown, Popham. English farming methods did not work on this soil without modification."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Yzma \"WRONG LEVERRR\" GIF — `https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif`. Bangers headline overlay top: **\"WRONG LEVERRRRR!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": ["1621"], "pulsing": []}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_24", "type": "story", "title": "How to Plant Corn", "body": ["Squanto kneels in a fresh mound. Four kernels of corn, one dead fish underneath, beans climbing the stalks, squash spreading at the base.", "He shows us where the eels run, which clams to take, the hollow tree where the bees nest.", "Without him, by his own count, we would all be dead before midsummer."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_25"}], "image_brief": "A field at the edge of the settlement. Squanto kneels in a freshly turned mound, pressing four kernels of corn into the soil with a small dead fish underneath them. Bradford and three colonists kneel beside him, copying. Spring leaves are coming in.", "timeline": {"active": [], "pulsing": ["1621", "1621"]}, "gif": null, "image": "images/bradford/squanto_teaching_corn.jpg"}, {"id": "slide_25", "type": "story", "title": "Massasoit and the Treaty", "body": ["Massasoit comes with sixty men. I come with what is left of mine.", "Squanto speaks for both sides. We agree in six plain points: neither will harm the other; if one is attacked, the other will help; we leave our weapons behind when we visit.", "I sign. Massasoit makes his mark. The treaty will hold as long as he lives."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_26"}], "image_brief": "A meeting in the common house. Massasoit, the Wampanoag sachem, sits on one side of a long table — flanked by sixty of his men outside. Bradford sits opposite him. Squanto stands between, translating. A wooden tankard between them, a roasted bird, a piece of paper. The two men's faces are serious, careful, equal.", "timeline": {"active": [], "pulsing": ["1621", "1621"]}, "gif": null, "image": "images/bradford/massasoit_carver_meeting.jpg"}, {"id": "slide_26", "type": "story", "title": "The First Harvest", "body": ["October, 1621. Our first harvest is in. It is enough.", "Massasoit and ninety of his men come down for three days. They bring five deer. We bring fowl and corn. The children of both sides eat at the same table.", "No one calls this a Thanksgiving for another two hundred years. We just call it a harvest, and we are grateful."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_27"}], "image_brief": "A long outdoor table at the edge of the settlement, autumn. Fifty-three colonists and ninety Wampanoag, two men deep, sharing the meal. Five deer brought by Massasoit's men. Corn, squash, fowl, fish. Children running between adults. Painted, warm afternoon light, leaves turning.", "timeline": {"active": [], "pulsing": ["1621", "1621"]}, "gif": null, "image": "images/plymouth_shared/thanksgiving_brownscombe.jpg"}, {"id": "slide_27", "type": "decision", "title": "Decision: Feed the New Mouths, or Ration?", "body": ["The second winter is leaner than the first harvest promised. The Fortune brought thirty-five new mouths in November and almost no food to feed them. The Adventurers want our debt repaid double; they did not warn us about the passengers.", "The colony is split. Some say share the storehouse equally with the newcomers and trust the spring planting to feed us all. Some say ration — original families on full share, new arrivals on half — until the corn is in the ground and growing. Some say leave the storehouse alone and trust English farming to outproduce the wild ground we cleared last year.", "", "What do I do?"], "key_terms": [], "buttons": [{"text": "FEED EVERYONE FROM THE STORES. PLANT EVERY FURROW. WE EAT OR STARVE TOGETHER.", "target": "slide_28"}, {"text": "RATION THE NEW ARRIVALS UNTIL THE PLANTING IS DONE. HARD BUT FAIR.", "target": "slide_28"}, {"text": "FARM IT THE ENGLISH WAY. WHEAT AND BARLEY IN STRAIGHT FURROWS, NOT MOUNDS.", "target": "slide_27a"}], "image_brief": "Spring 1622. The harbor in the distance with the Fortune at anchor, half-emptied — she came in November with thirty-five new colonists and almost no provisions. On the shore, the colony's remaining winter stores: barrels of salted fish, sacks of last fall's corn, dwindling. Bradford stands at the storehouse door with a ledger. The new arrivals stand on one side; the original Plymouth families on the other.", "timeline": {"active": [], "pulsing": ["1622", "1622"]}, "gif": null, "image": "images/plymouth_shared/thanksgiving_brownscombe.jpg"}, {"id": "slide_27a", "type": "gameover", "title": "WRONG LEVERRRR!", "body": ["I order English wheat in straight furrows. Squanto's mound-and-fish method is set aside as heathen.", "The wheat comes up sickly. The deer eat what survives.", "The second winter takes the rest of our elders. Bradford writes very little in 1623.", "Real history: New England colonies that succeeded copied Wampanoag agriculture — corn-bean-squash mounds with fish fertilizer. By 1623, those that refused to adapt starved or were absorbed."], "key_terms": [], "buttons": [{"text": "TRY AGAIN", "target": "slide_1"}, {"text": "SELECT ANOTHER CHARACTER", "target": "HOME"}], "image_brief": "Full-bleed: Terry Tate \"Office Linebacker\" tackle GIF embedded via Tenor — search `terry tate office linebacker gif`. Bangers headline overlay top: **\"YOU CAN'T FARM ON COMPANY TIME!\"** in `bone-white` with 2px black stroke.", "timeline": {"active": ["1622"], "pulsing": []}, "gif": "https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif"}, {"id": "slide_28", "type": "story", "title": "Squanto's Last Trip", "body": ["November, 1622. Squanto and I are on a diplomatic trip down the Cape. He falls ill on the second day.", "The bleeding from his nose is the sign, he says. I will write later that I think it was a sickness our ships brought from Europe — the kind his people had no shield against.", "He asks me to pray for him. I do. He asks me to send small gifts to his English friends as remembrances. He dies on the third day."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_29"}], "image_brief": "A small shallop on a salt creek. Bradford and Squanto in the bow, four other men at the oars. The autumn light is low. Squanto's face is gray-pale and there is sweat on his brow even in the cool air.", "timeline": {"active": [], "pulsing": ["1622", "1622"]}, "gif": null, "image": "images/bradford/squanto_teaching_corn.jpg"}, {"id": "slide_29", "type": "decision", "title": "Decision: Where Does Squanto Rest?", "body": ["The Massachusett relations say his people will claim his body if we permit. The oarsmen say we should bury him here at the cape, simply, today, before the cold makes the ground impossible. Brewster, when I send word, says bring him back to Plymouth where he taught our children to plant.", "Squanto did not say which he wanted.", "", "What do I do?"], "key_terms": [], "buttons": [{"text": "BURY HIM HERE. THE CAPE WAS HIS LAND BEFORE IT WAS OURS.", "target": "slide_30"}, {"text": "BRING HIS BODY BACK TO PLYMOUTH. HE TAUGHT US TO LIVE THERE.", "target": "slide_30"}, {"text": "LET THE MASSACHUSETT CLAIM HIM. HE BELONGS TO HIS PEOPLE FIRST.", "target": "slide_30"}], "image_brief": "A cold beach at low tide. Squanto's body wrapped in a wool English coat and a Wampanoag deerskin both, on a low litter. The four oarsmen stand at a distance. A small group of Wampanoag — Squanto's distant relations from a Massachusett village — wait at the tree line, having heard. The wood-flute leitmotif holds.", "timeline": {"active": ["1622"], "pulsing": []}, "gif": null, "image": "images/hub/plymouth_squanto.png"}, {"id": "slide_30", "type": "story", "title": "Governor", "body": ["I visit Squanto's grave at the cape every spring.", "The colony elects me governor in 1621 after John Carver dies. Thirty times in thirty-six years they hand me the chair.", "I record the laws, the harvests, the dead, the Wampanoag we trade with, the English ships that come.", "In 1630 the Massachusetts Bay fleet arrives — twenty thousand settlers, ten times what we are. Plymouth becomes a footnote in their wake."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_31"}], "image_brief": "A meetinghouse interior. The men of the colony around a long table. Bradford at the head, a quill in his hand, a ledger open in front of him. The window light is winter-pale.", "timeline": {"active": ["1621", "1657", "1621", "1657"], "pulsing": []}, "gif": null, "image": "images/bradford/bradford_portrait.jpg"}, {"id": "slide_31", "type": "story", "title": "The Plymouth Economy", "body": ["Our soil is rocky. Our growing season is short. Our coast is full of fish.", "We will not grow rich here. We will not need plantations or the kind of labor that fills the holds of ships out of Africa.", "The colonies further south will grow another way. Ours is a town of small farms, small workshops, and a meetinghouse in the middle."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_32"}], "image_brief": "A montage panel. Top-left: a small fishing boat hauling in a net. Top-right: a man at a forge. Bottom-left: a family kneeling in a vegetable patch behind a small wooden house. Bottom-right: a cooper hammering a barrel. No big plantations. No fields beyond the horizon. Small, walkable, local.", "timeline": {"active": [], "pulsing": []}, "gif": null, "image": "images/bradford/of_plymouth_plantation_manuscript.jpg"}, {"id": "slide_32", "type": "story", "title": "The Bigger Colony to the North", "body": ["Ten years after we landed, a much larger English colony plants itself north of us. Massachusetts Bay. Boston. Salem.", "We are a small town beside their great one. They are Puritan but not Separatists — they meant to reform the Church of England from inside it.", "Our story will get folded into theirs. I do not mind. I want the story to be told."], "key_terms": [{"name": "Pilgrims vs. Puritans", "def": "Both were strict English Protestants. PILGRIMS (1620, Plymouth) wanted to separate from the Church of England entirely. PURITANS (1630, Massachusetts Bay) wanted to \"purify\" it from inside. Different colonies, different goals."}], "buttons": [{"text": "CONTINUE", "target": "slide_33"}], "image_brief": "A wider painted map of the New England coast. A small dot marked PLYMOUTH on Cape Cod Bay. A larger, growing cluster of dots to the north marked MASSACHUSETTS BAY. Boston grows visibly larger between two beats of the slide.", "timeline": {"active": [], "pulsing": ["1630", "1630"]}, "gif": null, "image": "images/bradford/king_james_i_decritz.jpg"}, {"id": "slide_33", "type": "story", "title": "Of Plymouth Plantation", "body": ["I have been writing it since we landed. I call it *Of Plymouth Plantation*.", "I write down Brewster in the Yorkshire barn, the storm that cracked our beam, the Compact, the names of the dead, Squanto kneeling in the corn mound.", "I write because God is watching, and because if I do not write it, no one else will."], "key_terms": [{"name": "Of Plymouth Plantation", "def": "Bradford's history of the Plymouth Colony, written 1630–1651. Most of what we know about the first Thanksgiving, the General Sickness, and the Wampanoag alliance comes from this manuscript."}], "buttons": [{"text": "CONTINUE", "target": "slide_34"}], "image_brief": "A close-up of a leather-bound manuscript on a small wooden writing desk. Bradford's hand in plain wool sleeve, the quill mid-stroke. The page is dense with neat, slanting handwriting. The candle is low. Through a window, snow.", "timeline": {"active": ["1630", "1651"], "pulsing": []}, "gif": null, "image": "images/bradford/of_plymouth_plantation_manuscript.jpg"}, {"id": "slide_34", "type": "story", "title": "1657", "body": ["May, 1657. I am sixty-seven. The fever takes me at home, in my own bed, in a town I helped build out of nothing on the bones of someone else's village.", "My second wife Alice sits with me. The children — mine, Dorothy's, Alice's, all of them mine in the end — sit in the next room.", "Brewster is gone. Standish is gone. Massasoit is gone. Squanto has been gone for thirty-five years. I am the last one of the first hundred who is still here to remember it."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_35"}], "image_brief": "A small bedroom. Bradford, gray-haired and thin, sits up in bed with a Bible across his knees. Through the window, a Plymouth that has grown into something steady — fences, a meetinghouse, smoke from chimneys, the long shoreline beyond. Soft afternoon light.", "timeline": {"active": ["1657"], "pulsing": ["1657"]}, "gif": null, "image": "images/bradford/bradford_portrait.jpg"}, {"id": "slide_35", "type": "story", "title": "Stacking Review", "body": ["1606 — I join the Separatists at Scrooby.", "1608 — We escape to Holland.", "1619 — We charter the Mayflower.", "1620 — We land at Cape Cod.", "1620 — *The Compact, signed broad — Saints and Strangers as one.* (variant: *The Compact, negotiated — Hopkins helped us word it.*)", "1620–21 — Half of us die. Dorothy among them.", "1621 — Samoset. Squanto. Massasoit. The treaty. The harvest.", "1622 — *We chose to feed every mouth from the stores.* (variant: *We rationed the new arrivals until the planting was done.*)", "1622 — Squanto dies. *He rests at the cape, where his people walked.* (variants: *He rests in our churchyard, where he taught us to plant.* / *His Massachusett kin laid him where I never knew.*)", "1630 — Massachusetts Bay is founded. We become a footnote in their fleet's wake.", "1657 — I die."], "key_terms": [], "buttons": [{"text": "CONTINUE", "target": "slide_36"}], "image_brief": "A full-bleed parchment overlay — the player's \"ship's log\" — with Bradford's entire timeline stacked in his own hand, baked into the PNG per the parchment-fix pattern. Each event is a single line. The page is full. A quill rests at the bottom corner.", "timeline": {"active": ["1606", "1608", "1619", "1620", "1620", "1620", "1621", "1621"], "pulsing": ["1621", "1622", "1622", "1630", "1657"]}, "gif": null, "image": "images/bradford/of_plymouth_plantation_manuscript.jpg"}, {"id": "slide_36", "type": "story", "title": "Epilogue Card", "body": ["Most of what students will read about Plymouth, four hundred years from this winter, will come out of the book I am writing.", "The Compact. The Mayflower. The first harvest. The treaty with Massasoit. Squanto in the corn mound. The names of the dead.", "If you know any of it, you know it because I sat down at a small desk in a small house in a small town and put it on paper."], "key_terms": [], "buttons": [{"text": "→ SEE WHAT REALLY HAPPENED", "target": "slide_37"}, {"text": "→ CHOOSE ANOTHER ROUTE", "target": "HOME"}], "image_brief": "A bookshelf. A single leather-bound volume tipped forward, the spine reading *OF PLYMOUTH PLANTATION — WILLIAM BRADFORD*. Soft library light. The book looks well-handled, well-read. A modern museum tag is barely visible — this is the book in the present day.", "timeline": {"active": [], "pulsing": []}, "gif": null, "image": "images/bradford/of_plymouth_plantation_manuscript.jpg"}, {"id": "slide_37", "type": "story", "title": "What Really Happened (light teacher voice — outside the immersion HARD RULE, this is the post-game card)", "body": ["**Bradford lived to age 67.** He governed Plymouth for about 30 of its first 36 years. His manuscript *Of Plymouth Plantation* was lost during the American Revolution, found again in a London library in 1855, and finally returned to Massachusetts in 1897. It is the foundation of almost everything we know about the colony.", "", "**The Mayflower Compact** is widely cited as the first written framework for self-government on what becomes United States soil. It is short — under 200 words — and it does not abolish the King. But it sets a precedent: a community of ordinary people, by their own signatures, agreeing to be bound by laws they together establish.", "", "**The Wampanoag-Pilgrim alliance** held for Massasoit's lifetime. After his death, the treaty frayed. In 1675, his son Metacom — called King Philip — led a war against the New England colonies that killed thousands on both sides. That story belongs to Massasoit's route. It is not Bradford's to tell.", "", "**Plymouth's economy** stayed small. Subsistence farming, fishing, shipbuilding, small artisans. The colony was eventually absorbed into Massachusetts Bay in 1691. The lack of a plantation economy here was structural — short growing season, rocky soil, no cash crop — not a moral choice. The slavery economy will grow further south, where the climate and the crop demanded scale. That story belongs to Rolfe's route."], "key_terms": [], "buttons": [{"text": "→ CHOOSE ANOTHER ROUTE", "target": "HOME"}, {"text": "→ READ THE CREDITS", "target": "slide_38"}], "image_brief": "A clean slide-textbox card on `bg-parchment`. No portrait, no photo — just a chronicle-style card. Small `IM Fell English SC` header.", "timeline": {"active": [], "pulsing": []}, "gif": null}, {"id": "slide_38", "type": "story", "title": "Final Hand-off", "body": ["The story of Plymouth is one of six on this coast. Five other people are waiting to tell theirs.", "", "One of them was kidnapped from this very ground. One of them watched my father sign the treaty across the table. Three of them came south on different ships, for different reasons. They are not me. They will not tell it the way I told it.", "", "Go listen."], "key_terms": [], "buttons": [{"text": "→ CHOOSE ANOTHER ROUTE", "target": "HOME"}], "image_brief": "The Plymouth shoreline at autumn dusk. The meetinghouse, the small houses, smoke from chimneys, the bay beyond. A second silhouette on the horizon — the Massachusetts Bay fleet sailing in. The sky is gold-going-to-blue. A gull crosses.", "timeline": {"active": [], "pulsing": []}, "gif": null, "image": "images/bradford/embarkation_pilgrims_weir.jpg"}];
const HUB_HREF = "index.html?back=1";
const DEFAULT_BG = "images/hub/plymouth_bradford.jpg";

const stage = document.getElementById('stage');
const counter = document.getElementById('counter');

function renderSlide(slide) {
  const div = document.createElement('div');
  let cls = 'slide';
  if (slide.type === 'gameover') cls += ' gameover-slide';
  div.className = cls;
  div.id = slide.id;

  // Image priority: per-slide explicit image > DEFAULT_BG (character portrait) > gradient
  // Gameovers skip bg image entirely (they have their own dark bg + GIF center)
  if (slide.type !== 'gameover') {
    const bgImg = slide.image || DEFAULT_BG;
    if (bgImg) {
      div.classList.add('has-image');
      div.style.backgroundImage = `url('${bgImg}')`;
      // Smart bg-position based on image content type:
      //   portraits (face at top of image) → top-bias
      //   ships / hulls / fleets → bottom-bias
      //   maps / landscapes → center
      //   Per-slide override via slide.bg_position takes precedence
      let pos = slide.bg_position;
      if (!pos) {
        const fn = bgImg.toLowerCase();
        if (/portrait|chief|king|herowans_wife|smith\.jpg|bradford_|massasoit-relief|powhatan_|pocahontas_van_de_passe|squanto-billington|raleigh|metacom|appleton|de_critz|de_passe|chilton-stepping|pilgrim-maiden|maiden-statue|statue/.test(fn)) {
          pos = 'center 32%'; // top-bias for portrait/figure faces (pushed down so faces sit in visible band)
        } else if (/ships|mayflower|fleet|halsall|caravel|sea_venture|delfshaven/.test(fn)) {
          pos = 'center 70%'; // bottom-bias for ship hulls
        } else if (/burial|fire|stove|hearth/.test(fn)) {
          pos = 'center 60%';
        } else {
          pos = 'center 45%'; // slight top-bias default — most paintings have action in upper half
        }
      }
      div.style.backgroundPosition = pos;
    }
  }

  if (slide.gif) {
    const gifImg = document.createElement('img');
    gifImg.className = 'fullscreen-gif';
    gifImg.src = slide.gif;
    gifImg.alt = 'gameover';
    div.appendChild(gifImg);
  }

  // Right-side panel wraps card + buttons in a flex column so they never overlap
  const panel = document.createElement('div');
  panel.className = 'panel';

  const card = document.createElement('div');
  card.className = 'card';
  if (slide.title && slide.title.trim()) {
    const h2 = document.createElement('h2');
    h2.textContent = slide.title;
    card.appendChild(h2);
  }
  /* === KEY-TERM RENDER PATCHED === */
  const body = document.createElement('div');
  body.className = 'body';
  // Auto-bold any key_term name found in body text (word-boundary, case-insensitive).
  const _boldTerms = (line) => {
    if (!slide.key_terms) return line;
    let out = line;
    slide.key_terms.forEach(kt => {
      const escaped = kt.name.replace(/[.*+?^${}()|[\]\]/g, '\$&');
      const re = new RegExp('\b(' + escaped + ')\b', 'gi');
      out = out.replace(re, '<strong>$1</strong>');
    });
    return out;
  };
  slide.body.forEach(p => {
    const para = document.createElement('p');
    para.innerHTML = _boldTerms(p);
    body.appendChild(para);
  });
  card.appendChild(body);

  // KEY TERMS - render below body as **Name:** definition
  if (slide.key_terms && slide.key_terms.length) {
    const ktWrap = document.createElement('div');
    ktWrap.className = 'keyterms';
    slide.key_terms.forEach(kt => {
      const defEl = document.createElement('div');
      defEl.className = 'keyterm';
      defEl.innerHTML = `<strong>${kt.name}:</strong> ${kt.def}`;
      ktWrap.appendChild(defEl);
    });
    card.appendChild(ktWrap);
  }

  panel.appendChild(card);

  const btnWrap = document.createElement('div');
  btnWrap.className = 'buttons';
  /* === BUTTON SHUFFLE PATCHED === */
  let _btns = slide.buttons.slice();
  if (_btns.length > 1 && slide.shuffle !== false) {
    // Fisher-Yates shuffle
    for (let i = _btns.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [_btns[i], _btns[j]] = [_btns[j], _btns[i]];
    }
    /* === CORRECT-BIAS PATCHED === */
    // If the "correct" button (one that DOESN'T target dead/gameover/fail) ended up
    // at position 0, with 60% probability swap it with a later slot. Students can't
    // just click the first option that appears.
    const _isWrong = (t) => /dead|gameover|fail|death/i.test(t || '');
    const _correctIdx = _btns.findIndex(b => !_isWrong(b.target));
    if (_correctIdx === 0 && _btns.length > 1 && Math.random() < 0.6) {
      const _newPos = 1 + Math.floor(Math.random() * (_btns.length - 1));
      [_btns[0], _btns[_newPos]] = [_btns[_newPos], _btns[0]];
    }
  }
  /* === ENDING LOCKOUT PATCHED === */
  const _REVEAL_INITIAL = (slide.revealInitial != null) ? slide.revealInitial : (_btns.length > 1 ? 1000 : 0);
  const _REVEAL_STAGGER = (slide.revealStagger != null) ? slide.revealStagger : (_btns.length > 1 ? 2000 : 0);
  const _isEnding = _btns.some(b => b.target === 'HOME');
  const _homeDelay = slide.homeDelay != null
    ? slide.homeDelay
    : (slide.type === 'gameover' ? 8000 : 12000);

  _btns.forEach((b, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    const _origText = b.text;
    btn.textContent = _origText;
    btn.addEventListener('click', () => goToSlide(b.target));

    // Multi-button stagger (existing behavior)
    if (_btns.length > 1) {
      btn.style.opacity = '0';
      btn.style.pointerEvents = 'none';
      btn.style.transform = 'translateY(8px)';
      btn.style.transition = 'opacity 0.5s ease, transform 0.5s ease';
      setTimeout(() => {
        btn.style.opacity = '1';
        btn.style.pointerEvents = 'auto';
        btn.style.transform = 'translateY(0)';
      }, _REVEAL_INITIAL + i * _REVEAL_STAGGER);
    }

    // Ending lockout: HOME-target buttons get an extra delay + countdown badge
    if (b.target === 'HOME' && _homeDelay > 0) {
      btn.style.pointerEvents = 'none';
      btn.style.opacity = '0.45';
      btn.style.filter = 'grayscale(0.6)';
      btn.style.cursor = 'wait';
      const startTime = Date.now();
      const tick = () => {
        const remaining = Math.ceil((_homeDelay - (Date.now() - startTime)) / 1000);
        if (remaining > 0) {
          btn.textContent = _origText + '  (' + remaining + ')';
          setTimeout(tick, 250);
        } else {
          btn.textContent = _origText;
          btn.style.pointerEvents = 'auto';
          btn.style.opacity = '1';
          btn.style.filter = 'none';
          btn.style.cursor = 'pointer';
        }
      };
      tick();
    }
    btnWrap.appendChild(btn);
  });
  panel.appendChild(btnWrap);

  div.appendChild(panel);

  stage.appendChild(div);
  return div;
}

function updateTimeline(state) {
  document.querySelectorAll('.tick').forEach(tick => {
    const year = tick.dataset.year;
    const isHistory = tick.classList.contains('history');
    tick.classList.remove('active', 'pulsing');
    if (!isHistory) tick.classList.remove('revealed');
    if (state.active && state.active.includes(year)) {
      tick.classList.add('active', 'revealed');
    }
    if (state.pulsing && state.pulsing.includes(year)) {
      tick.classList.add('active', 'pulsing', 'revealed');
    }
  });
}

function revealCard(slideEl) {
  const paras = slideEl.querySelectorAll('.card .body p');
  const chips = slideEl.querySelectorAll('.card .keyterm');
  const buttons = slideEl.querySelector('.panel > .buttons');
  paras.forEach((p, i) => setTimeout(() => p.classList.add('shown'), 250 + i * 600));
  const afterBody = 250 + paras.length * 600;
  chips.forEach((c, i) => setTimeout(() => c.classList.add('shown'), afterBody + 200 + i * 400));
  if (buttons) {
    const tail = afterBody + 200 + chips.length * 400 + 200;
    setTimeout(() => buttons.classList.add('shown'), tail);
  }
}

function showSlide(idx) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  const slide = SLIDES[idx];
  if (!slide) return;
  let el = document.getElementById(slide.id);
  if (!el) el = renderSlide(slide);
  el.querySelectorAll('.card .body p').forEach(p => p.classList.remove('shown'));
  el.querySelectorAll('.card .keyterm').forEach(c => c.classList.remove('shown'));
  const bw = el.querySelector('.panel > .buttons');
  if (bw) bw.classList.remove('shown');
  el.classList.add('active');
  updateTimeline(slide.timeline || {});
  counter.textContent = `${idx + 1} / ${SLIDES.length}`;
  applySlideSFX(slide);
  setTimeout(() => revealCard(el), 200);
}

// Per-slide ambient SFX layer (sailing/storm/forest/battle/etc.)
// Each slide can specify slide.sfx → URL of an MP3 to loop quietly under
// the music bed. Switching slides crossfades to the new SFX or stops if none.
const bgSfx = document.getElementById('bg-sfx');
let currentSfxSrc = null;
function applySlideSFX(slide) {
  if (!bgSfx) return;
  const wantedSrc = slide.sfx || null;
  if (wantedSrc === currentSfxSrc) return; // already playing this SFX

  // Fade out current SFX
  if (!bgSfx.paused && bgSfx.volume > 0) {
    const startVol = bgSfx.volume;
    const fadeOut = setInterval(() => {
      bgSfx.volume = Math.max(0, bgSfx.volume - 0.05);
      if (bgSfx.volume <= 0) {
        clearInterval(fadeOut);
        bgSfx.pause();
        // Then start new SFX if any
        if (wantedSrc) startSfx(wantedSrc);
      }
    }, 50);
  } else if (wantedSrc) {
    startSfx(wantedSrc);
  }
  currentSfxSrc = wantedSrc;
}
function startSfx(src) {
  if (!bgSfx) return;
  bgSfx.src = src;
  bgSfx.loop = true;
  bgSfx.volume = 0;
  bgSfx.play().then(() => {
    let v = 0;
    const fadeIn = setInterval(() => {
      v += 0.025;
      if (v >= 0.32) { bgSfx.volume = 0.32; clearInterval(fadeIn); }
      else bgSfx.volume = v;
    }, 80);
  }).catch(() => {});
}

function goToSlide(target) {
  if (target === 'HOME') { window.location.href = HUB_HREF; return; }
  const idx = SLIDES.findIndex(s => s.id === target);
  if (idx === -1) return;
  showSlide(idx);
}

// Audio unlock + fade-in
const bgMusic = document.getElementById('bg-music');
let audioStarted = false;
function startMusic() {
  if (audioStarted || !bgMusic) return;
  audioStarted = true;
  bgMusic.volume = 0;
  bgMusic.play().then(() => {
    let v = 0;
    const fade = setInterval(() => {
      v += 0.03;
      if (v >= 0.45) { bgMusic.volume = 0.45; clearInterval(fade); }
      else bgMusic.volume = v;
    }, 100);
  }).catch(() => {});
}
document.addEventListener('click', startMusic, { once: true });
document.addEventListener('keydown', startMusic, { once: true });

showSlide(0);
</script>
