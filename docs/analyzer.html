<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Analyzer — Time Warp: Plymouth or Jamestown</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=IM+Fell+English&family=IM+Fell+English+SC&family=Share+Tech&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; width: 100%; overflow: hidden; background: #0a0f1a; color: #fff; font-family: 'Bangers', sans-serif; }

body {
  background:
    radial-gradient(ellipse at 50% 30%, rgba(50,80,120,0.4) 0%, transparent 60%),
    linear-gradient(180deg, #0a0f1a 0%, #1a2535 100%);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 4vh 4vw;
  position: relative;
}

body::before {
  content: '';
  position: absolute; inset: 0;
  background:
    radial-gradient(ellipse 700px 200px at 30% 60%, rgba(255,255,255,0.04) 0%, transparent 70%),
    radial-gradient(ellipse 500px 180px at 70% 40%, rgba(255,255,255,0.05) 0%, transparent 70%);
  animation: fogdrift 35s ease-in-out infinite alternate;
  pointer-events: none;
}
@keyframes fogdrift { 0%{transform:translate(0,0);} 100%{transform:translate(40px,-20px);} }

.q {
  position: relative;
  z-index: 5;
  text-align: center;
  width: 100%;
  max-width: 900px;
  display: none;
}
.q.active { display: block; }
.q.q-sides.active { display: flex; flex-direction: column; align-items: center; max-width: 1400px; }

/* Q1 side panels — image-driven */
.side-panels {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3vw;
  width: 100%;
  max-width: 1300px;
  margin: 0 auto;
}
.side-panel {
  position: relative;
  background: transparent;
  border: 4px solid #1a1a1a;
  border-radius: 12px;
  padding: 0;
  overflow: hidden;
  cursor: pointer;
  height: 62vh;
  min-height: 380px;
  transition: all 250ms ease;
  box-shadow: 0 12px 36px rgba(0,0,0,0.7);
}
.side-panel:hover { transform: translateY(-6px) scale(1.015); box-shadow: 0 20px 50px rgba(0,0,0,0.85); }
.plymouth-panel:hover { border-color: #88b3e0; }
.jamestown-panel:hover { border-color: #e6a360; }

.side-img {
  position: absolute;
  inset: 0;
  background-size: cover;
  background-position: center;
  filter: saturate(0.85);
  transition: filter 300ms ease;
}
.side-panel:hover .side-img { filter: saturate(1.0); }

.side-overlay {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0) 0%, rgba(0,0,0,0.85) 60%);
  padding: 6vh 3vw 3vh;
  text-align: center;
  color: #fff;
}
.side-label {
  font-family: 'Bangers', sans-serif;
  font-size: clamp(1.4rem, 2.8vw, 2.4rem);
  letter-spacing: 5px;
  margin-bottom: 1vh;
  text-shadow: 3px 3px 0 #000;
}
.plymouth-panel .side-label { color: #88b3e0; }
.jamestown-panel .side-label { color: #e6a360; }
.side-cta {
  font-family: 'Bangers', sans-serif;
  font-size: clamp(1.1rem, 2vw, 1.5rem);
  margin-bottom: 0.8vh;
  letter-spacing: 1px;
}
.side-sub {
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: clamp(0.85rem, 1.2vw, 1rem);
  color: #d8d0b8;
  max-width: 380px;
  margin: 0 auto;
  line-height: 1.5;
}

.q-tag {
  font-family: 'IM Fell English SC', serif;
  letter-spacing: 6px;
  color: #f4d166;
  font-size: clamp(0.9rem, 1.3vw, 1.1rem);
  opacity: 0.7;
  margin-bottom: 1vh;
}

.q h1 {
  font-family: 'Bangers', sans-serif;
  color: #fff;
  font-size: clamp(1.6rem, 4vw, 3rem);
  letter-spacing: 2px;
  line-height: 1.3;
  margin-bottom: 5vh;
  text-shadow: 3px 3px 0 #000, 5px 5px 12px rgba(0,0,0,0.7);
  max-width: 850px;
  margin-left: auto;
  margin-right: auto;
}

.options {
  display: flex;
  flex-direction: column;
  gap: 2vh;
  max-width: 700px;
  margin: 0 auto;
}

button.opt {
  background: rgba(255,255,255,0.55);
  backdrop-filter: blur(4px);
  -webkit-backdrop-filter: blur(4px);
  color: #0a0a1a;
  border: 2px solid rgba(0,0,0,0.7);
  border-radius: 8px;
  padding: 1.4vh 3vw 1.4vh 16vh;
  font-family: 'Bangers', sans-serif;
  font-size: clamp(1.1rem, 2vw, 1.5rem);
  letter-spacing: 1px;
  cursor: pointer;
  text-align: left;
  transition: all 200ms ease;
  box-shadow: 0 6px 18px rgba(0,0,0,0.5);
  position: relative;
  min-height: 14vh;
  overflow: hidden;
}
button.opt:hover {
  background: rgba(255,255,255,0.78);
  transform: translateX(8px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.65);
  border-color: #000;
}
button.opt .portrait {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 14vh;
  background-size: cover;
  background-position: center top;
  border-right: 2px solid #000;
}
button.opt:hover .portrait { filter: brightness(1.05); }
button.opt .arrow {
  position: absolute;
  right: 3vw;
  top: 50%;
  transform: translateY(-50%);
  color: #999;
  transition: color 150ms ease;
}
button.opt:hover .arrow { color: #d4af37; }
button.opt .sub {
  display: block;
  font-family: 'IM Fell English', serif;
  font-style: italic;
  font-size: 0.7em;
  color: #5a4a2e;
  letter-spacing: 0;
  margin-top: 6px;
  text-transform: none;
}

.back-btn {
  position: fixed;
  top: 16px; left: 16px;
  background: transparent;
  border: 1px solid rgba(255,255,255,0.3);
  color: rgba(255,255,255,0.6);
  padding: 8px 14px;
  font-family: 'Share Tech', sans-serif;
  font-size: 0.85rem;
  cursor: pointer;
  border-radius: 4px;
  z-index: 10;
}
.back-btn:hover { color: #fff; border-color: #fff; }
</style>
</head>
<body>

<!-- Hub ambient music continues across analyzer for continuity -->
<audio id="bg-music" loop preload="auto"><source src="audio/hub/main.mp3" type="audio/mpeg"></audio>

<button class="back-btn" onclick="location.href='index.html'">← Back to title</button>

<!-- Q1: Why are you crossing the Atlantic? — IMAGE-DRIVEN SIDE PANELS -->
<div class="q active q-sides" id="q1">
  <div class="q-tag">QUESTION ONE</div>
  <h1>Why are you crossing the Atlantic?</h1>
  <div class="side-panels">
    <button class="side-panel plymouth-panel" data-side="plymouth">
      <div class="side-img" style="background-image: url('images/hub/plymouth_pilgrims.jpg'); background-position: center center;"></div>
      <div class="side-overlay">
        <div class="side-label">PLYMOUTH</div>
        <div class="side-cta">To practice my own religion</div>
        <div class="side-sub">My church has been hunted in England. I cross for the right to pray as I choose.</div>
      </div>
    </button>
    <button class="side-panel jamestown-panel" data-side="jamestown">
      <div class="side-img" style="background-image: url('images/hub/jamestown_smith.jpg'); background-position: center top;"></div>
      <div class="side-overlay">
        <div class="side-label">JAMESTOWN</div>
        <div class="side-cta">For riches and adventure</div>
        <div class="side-sub">There is gold across the sea. I cross for what I can take, build, or marry.</div>
      </div>
    </button>
  </div>
</div>

<!-- Q2 — Plymouth side -->
<div class="q" id="q2-plymouth">
  <div class="q-tag">QUESTION TWO &middot; PLYMOUTH</div>
  <h1>What kind of person are you?</h1>
  <div class="options">
    <button class="opt" onclick="location.href='bradford.html'">
      <span class="portrait" style="background-image: url('images/hub/plymouth_bradford.jpg');"></span>
      I am a leader. I will write what we did so my children remember.
      <span class="sub">William Bradford, Plymouth governor + chronicler.</span>
      <span class="arrow">→</span>
    </button>
    <button class="opt" onclick="location.href='squanto.html'">
      <span class="portrait" style="background-image: url('images/hub/plymouth_squanto.png');"></span>
      I have lost everything. The only road home is through someone else's road.
      <span class="sub">Squanto (Tisquantum). Captured, sold to Spain, returned to a village of graves.</span>
      <span class="arrow">→</span>
    </button>
    <button class="opt" onclick="location.href='massasoit.html'">
      <span class="portrait" style="background-image: url('images/hub/plymouth_massasoit.jpg');"></span>
      I rule what is mine. I will choose who lives on my land.
      <span class="sub">Massasoit, sachem of the Wampanoag. Kept the peace fifty years.</span>
      <span class="arrow">→</span>
    </button>
    <button class="opt" onclick="location.href='chilton.html'">
      <span class="portrait" style="background-image: url('images/chilton/chilton-stepping-ashore.png');"></span>
      I am thirteen and orphaned. I will outlive everyone.
      <span class="sub">Mary Chilton. Mayflower passenger, lost both parents the first winter, lived to see King Philip's War.</span>
      <span class="arrow">→</span>
    </button>
  </div>
</div>

<!-- Q2 — Jamestown side -->
<div class="q" id="q2-jamestown">
  <div class="q-tag">QUESTION TWO &middot; JAMESTOWN</div>
  <h1>What kind of person are you?</h1>
  <div class="options">
    <button class="opt" onclick="location.href='smith.html'">
      <span class="portrait" style="background-image: url('images/hub/jamestown_smith.jpg');"></span>
      I am a fighter. I have killed men in Hungary for pay.
      <span class="sub">John Smith. Soldier of fortune. Took food at gunpoint to keep the colony alive.</span>
      <span class="arrow">→</span>
    </button>
    <button class="opt" onclick="location.href='rolfe.html'">
      <span class="portrait" style="background-image: url('images/hub/jamestown_rolfe.jpg');"></span>
      I see opportunity in new things. I will plant something the world wants.
      <span class="sub">John Rolfe. Tobacco entrepreneur. Husband of Pocahontas.</span>
      <span class="arrow">→</span>
    </button>
    <button class="opt" onclick="location.href='powhatan.html'">
      <span class="portrait" style="background-image: url('images/hub/jamestown_powhatan.jpg');"></span>
      This was my country before any English foot touched it.
      <span class="sub">Powhatan. Paramount chief of thirty tribes. Watched the English keep coming.</span>
      <span class="arrow">→</span>
    </button>
  </div>
</div>

<script>
// Q1 click → show Q2 (correct side)
document.querySelectorAll('#q1 .opt, #q1 .side-panel').forEach(btn => {
  btn.addEventListener('click', () => {
    const side = btn.dataset.side;
    document.getElementById('q1').classList.remove('active');
    document.getElementById('q2-' + side).classList.add('active');
  });
});

// Audio unlock + fade-in
const bgMusic = document.getElementById('bg-music');
let audioStarted = false;
function startMusic() {
  if (audioStarted || !bgMusic) return;
  audioStarted = true;
  bgMusic.volume = 0;
  bgMusic.play().then(() => {
    let v = 0;
    const fade = setInterval(() => {
      v += 0.03;
      if (v >= 0.4) { bgMusic.volume = 0.4; clearInterval(fade); }
      else bgMusic.volume = v;
    }, 100);
  }).catch(() => {});
}
document.addEventListener('click', startMusic, { once: true });
document.addEventListener('keydown', startMusic, { once: true });
</script>

</body>
</html>
