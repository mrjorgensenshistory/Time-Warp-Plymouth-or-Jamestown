.stage { position: absolute; inset: 0; overflow: hidden; }

.slide {

.card {

.card .body p.shown { opacity: 1; transform: translateY(0); }

.buttons {

button.choice {

button.choice:hover { background: #fff; transform: scale(1.03); }

.slide.gameover-slide { background: #1a0a0a !important; }

.slide.gameover-slide .card {

.slide.gameover-slide .card h2 {

  animation: shake 0.5s ease;
  text-shadow: 2px 2px 0 #6a0000;

@keyframes shake {

  40%{transform:translateX(12px);}
  60%{transform:translateX(-6px);}
  80%{transform:translateX(6px);}

.slide.gameover-slide button.choice {

}
.slide.gameover-slide button.choice:hover { background: #ff3333; }

.timeline {
  position: fixed;

  pointer-events: none;

.tick.revealed { visibility: visible; opacity: 1; }
.tick .dot {
  width: 14px; height: 14px;
  border-radius: 50%;
  background: #4a3a28;

.tick.history .label { color: #8a7a64; opacity: 0.7; font-size: 10px; }
.tick.active .dot {

.tick.pulsing .dot { animation: pulse 1.4s ease-in-out infinite; }
@keyframes pulse {
  0%,100%{box-shadow:0 0 8px rgba(212,175,55,0.5);}
  50%{box-shadow:0 0 22px rgba(212,175,55,1.0);}
}

.header-tag {

.credits {

dow.", "timeline": {"active": ["1610"], "pulsing": []}, "gif": null}, {"id": "slide_6", "type": "decision", "title": "The Decision to Abandon (Decision 1)", "body": ["The new governor takes one look at us and orders the colony abandoned. We pack what we can carry. We board the ship. The fort is left to rot.", "We sail downriver toward the open sea. Toward home.", "Three miles before we reach the bay, a ship is coming the other way. It is Lord De La Warr with three hundred fresh men and a hold full of food. He turns us around."], "buttons": [{"text": "GO HOME — VIRGINIA IS A GRAVEYARD", "target": "slide_7"}, {"text": "TURN THE SHIP AROUND. TRY AGAIN.", "target": "slide_7"}], "image_brief": "The James River. A small ship — the Deliverance — anchored midstream, sails being raised. The fort behind it, gates open and empty. A line of survivors trudging toward the shore with bundles.", "timeline": {"active": [], "pulsing": []}, "gif": null}, {"id": "slide_7", "type": "story", "title": "GAMEOVER A — \"I Went Home\"", "body": [], "buttons": [{"text": "→ Continue", "target": "slide_8"}], "image_brief": "Full-bleed: Yzma \"WRONG LEVERRR\" GIF (Tenor URL `https://media.tenor.com/mcS-PaTlDawAAAAM/pull-the-lever-wrong-lever.gif`). Bangers headline overlay top: **\"WRONG LEVERRRRR!\"** in bone-white with 2px black stroke.", "timeline": {"active": [], "pulsing": []}, "gif": null}, {"id": "slide_8", "type": "story", "title": "The Land Itself", "body": ["The Company expects gold. There is no gold here. There is no silver. There are no Aztec cities to plunder.", "What there is, is land. Black soil along the river bottoms, deep enough to push a stick into up to your wrist.", "I am a planter. I look at this dirt and I see something the Company cannot see yet."], "buttons": [{"text": "CONTINUE →", "target": "slide_9"}], "image_brief": "Wide shot of the Virginia tidewater. Tall trees, slow river bend, soft afternoon haze. A man walking alone along a path with a leather satchel. Disney *P rget": "HOME"}], "image_brief": "Full-bleed: Terry Tate \"Office Linebacker\" / Colonial Enforcer reskin GIF, slamming a barrel labeled \"COMPANY PROFITS.\" Bangers headline overlay top: **\"YOU CAN'T STARVE ON COMPANY TIME!\"**", "timeline": {"active": [], "pulsing": []}, "gif": null}, {"id": "slide_12", "type": "story", "title": "First Crop, 1612", "body": ["I plant the Spanish seeds in a small plot at the edge of the field. I crossbreed them with the local strain — the local plants are hardier in this soil; the Spanish leaves are sweeter on the tongue.", "The first harvest comes in. I roll a leaf in my hands. It smells like sugar and pine.", "I dry the crop. I roll the bundles. I send a single barrel back to England on the next ship and I wait."], "buttons": [{"text": "CONTINUE →", "target": "slide_13"}], "image_brief": "A tobacco field at dawn. The new plants taller, leaves broader, a paler gold-green than the local strain. Rolfe kneeling at the edge, leaf between his fingers. Mist rising off the field. Disney *Pocahontas* visual mood — soft painted light.", "timeline": {"active": ["1612", "1612"], "pulsing": []}, "gif": null}, {"id": "slide_13", "type": "story", "title": "The Letter from London", "body": ["The reply comes back the next year. London has paid three shillings a pound. They want every leaf we can grow.", "The fort is loud for the first time since I arrived. Men are laughing. The Company is sending more ships, more men, more seed.", "I have saved the colony. I am twenty-nine years old. I am still a widower."], "buttons": [{"text": "CONTINUE →", "target": "slide_14"}], "image_brief": "A small wooden desk inside the fort. A letter unfolded, the wax seal of the Virginia Company broken. A pile of coin pouches beside it. Through the window, men loading a ship at the dock.", "timeline": {"active": ["1614", "1614"], "pulsing": []}, "gif": null}, {"id": "slide_14", "type": "story", "title": "Pocahontas", "body": ["Her name is Matoaka. The English call her Pocahontas. She is the daughter of the chief of the Powhatan Confederacy.", "Last year the colonists kidnapped her to use as a bargaining chip against her father. She has been a captive at Henrico for over a year. They have taught her English. They have baptized her Rebecca.", "I have spoken with her three times. She knows exactly what has been done to her. She is the most clear-eyed person in this colony."], "buttons": [{"text": "CONTINUE →", "target": "slide_15"}], "image_brief": "A young Powhatan woman — perhaps nineteen — standing by the river in English-style clothes that do not yet fit her. Her hair is long but pinned back the English way. She is reading a Bible held open in her hands. Her expression is steady and watchful, not soft. Disney *Pocahontas* visual mood for the setting — leaves, water — but the figure herself is rendered with dignity, no Disney whimsy.", "timeline": {"active": [], "pulsing": []}, "gif": null}, {"id": "slide_15", "type": "decision", "title": "The Marriage Proposal (Decision 3)", "body": ["I am writing the governor a letter. I am asking permission to marry her.", "I tell him this is a peace settlement — a marriage between our peoples will end the wars on the river. I tell him I am acting for the colony.", "That is half the truth. The other half is that I have come to know her, and I love her, and I do not know which half is bigger."], "buttons": [{"text": "BE HONEST. WRITE BOTH HALVES OF THE TRUTH.", "target": "slide_16"}, {"text": "WRITE IT AS POLITICS ONLY. KEEP THE FEELING PRIVATE.", "target": "slide_16"}], "image_brief": "A small chapel inside the fort. Rolfe at a writing desk by candlelight. A long letter half-finished. The paper visible but the words blurred. Outside the window, the river at night.", "timeline": {"active": [], "pulsing": []}, "gif": null}, {"id": "slide_16", "type": "story", "title": "GAMEOVER C — \"I Married Her for Politics\"", "body": [], "buttons": [{"text": "TRY AGAIN →", "target": "slide_15"}, {"text": "SE : "story", "title": "The Court of King James", "body": ["London is loud and dirty and cold. The court treats my wife like a curiosity from a traveling fair.", "She charms King James. She speaks better English than half the lords. She watches them watching her.", "One night she tells me she misses the river. I tell her we will sail home in the spring. She nods. She does not say anything else."], "buttons": [{"text": "CONTINUE →", "target": "slide_20"}], "image_brief": "A grand hall in London. Pocahontas in full English court dress — stiff lace collar, embroidered bodice, pearl earrings. King James I on a chair of state in the background, leaning forward. Other courtiers gawking. Pocahontas's posture is straight, her eyes level. She is not impressed.", "timeline": {"active": [], "pulsing": []}, "gif": null}, {"id": "slide_20", "type": "decision", "title": "Gravesend (Decision 4)", "body": ["She falls ill the morning we are meant to board the ship. The captain holds the tide for two days. By the third day she is gone.", "Pocahontas — Matoaka — Rebecca — is buried in the churchyard at Gravesend. She is twenty-one years old.", "Thomas is two. His grandmother in England wants to keep him. The Virginia ship will not wait another week."], "buttons": [{"text": "LEAVE THOMAS WITH HIS GRANDMOTHER. SAIL HOME.", "target": "slide_21"}, {"text": "STAY IN ENGLAND. RAISE HIM HERE.", "target": "slide_21"}], "image_brief": "A small inn at Gravesend, on the Thames. A bedroom with a low fire. Pocahontas in the bed, eyes closed, very pale. Thomas — now two years old — held by an English nurse at the doorway. Rolfe at the bedside, head in his hands. Window opens on the masts of the ship that was supposed to carry them home.", "timeline": {"active": ["1617", "1617"], "pulsing": []}, "gif": null}, {"id": "slide_21", "type": "story", "title": "GAMEOVER D — \"I Stayed in England\"", "body": [], "buttons": [{"text": "TRY AGAIN →", "target": "slide_20"}, {"text": "SELECT ANOTHER CHARACTER →", " d and water before he sails north.", "He calls them \"twenty and odd Negroes.\" That is the phrase I write in my own letter to the Company. I do not yet have another phrase for it.", "The ship's master and the colony's wealthier planters meet him at the dock. They pay in tobacco. The Africans are walked into the colony."], "buttons": [{"text": "STAY SILENT. RECORD THE TRANSACTION IN MY LETTER.", "target": "slide_25"}, {"text": "STAND ON THE DOCK AND DENOUNCE IT.", "target": "slide_25"}], "image_brief": "The Jamestown dock at midday. A Dutch warship — the *White Lion* — tied up. From its hold, a line of African men and women being walked down the gangway in chains. English colonists watching. A merchant counts coin into the Dutch captain's hand. The visual is somber, factual, not lurid. No whips visible. No graphic imagery. Period-engraving style.", "timeline": {"active": ["1619", "1619"], "pulsing": []}, "gif": null}, {"id": "slide_25", "type": "story", "title": "GAMEOVER E — \"I Spoke Out\"", "body": [], "buttons": [{"text": "TRY AGAIN →", "target": "slide_24"}, {"text": "SELECT ANOTHER CHARACTER →", "target": "HOME"}], "image_brief": "Full-bleed: Tulio & Miguel from *Road to El Dorado* laughing GIF — but layered with a slow fade-in of Rolfe being escorted onto a ship by Company officers. Bangers headline overlay top: **\"IT'S TOUGH TO BE A GOD…\"**", "timeline": {"active": [], "pulsing": []}, "gif": null}, {"id": "slide_26", "type": "story", "title": "The Math of the Cash Crop", "body": ["The colony writes the Africans into its labor records as if they are indentured like the English servants. Some of them work off a term and are released. Most are not. The records become less and less clear over the next ten years. By the time the law catches up to the practice, the practice has set.", "Tobacco needs hands. England cannot send enough. The Africans are not arriving by Company plan — but the Company keeps the system that demanded them.", "I write the letter. I count the bundles. I keep my hands working."], "buttons": [{"text": "CONTINUE →", "target": "slide_27"}], "image_brief": "A long view of the plantation at sunset. The drying sheds longer now. Workers — both English indentured servants and African captives — leaving the fields. The river in the distance. A single ship loading bundles at the dock. The image is beautiful and uncomfortable at the same time. Disney *Pocahontas* visual mood applied carefully — the painted light without softening the content.", "timeline": {"active": ["1619"], "pulsing": []}, "gif": null}, {"id": "slide_27", "type": "story", "title": "The House of Burgesses", "body": ["The same summer the Dutch ship lands, twenty-two of us meet in the church and form the first elected assembly in any English colony in the new world.", "We pass laws on tobacco prices. On drunkenness. On church attendance. On servant contracts.", "We do not pass any law on the twenty Africans. We do not yet know what to call what we have done. The silence in the records is its own kind of answer."], "buttons": [{"text": "CONTINUE →", "target": "slide_28"}], "image_brief": "A small wooden meeting-house inside the fort. Twenty-two English burgesses seated on benches. A single speaker standing. A clerk taking notes. Daylight through the open door.", "timeline": {"active": ["1619", "1619"], "pulsing": []}, "gif": null}, {"id": "slide_28", "type": "story", "title": "The Years Between", "body": ["The years pass. I marry a third time — Jane Pierce, an English woman from Virginia. We have a daughter. I name her Elizabeth.", "The plantation grows. The labor force grows with it. Ships from England come weekly now.", "Up north, I hear, another colony has landed at a place called Plymouth. They are religious people. They are not after profit. I do not know any of them. I send my regards through a passing trader and never hear back."], "buttons": [{"text": "CONTINUE →", "target": "slide_29"}], "image_brief": "A small montage feel — Rolfe at const HUB_HREF = "index.html?back=1";

const stage = document.getElementById('stage');
const counter = document.getElementById('counter');

function renderSlide(slide) {
  const div = document.createElement('div');
  let cls = 'slide';
  if (slide.type === 'gameover') cls += ' gameover-slide';
  div.className = cls;
  div.id = slide.id;

  if (slide.gif) {
    const gifImg = document.createElement('img');
    gifImg.className = 'fullscreen-gif';
    gifImg.src = slide.gif;
    gifImg.alt = 'gameover';
    div.appendChild(gifImg);
  }

  const card = document.createElement('div');
  card.className = 'card';
  if (slide.title && slide.title.trim()) {
    const h2 = document.createElement('h2');
    h2.textContent = slide.title;
    card.appendChild(h2);
  }
  const body = document.createElement('div');
  body.className = 'body';
  slide.body.forEach(p => {
    const para = document.createElement('p');
    para.innerHTML = p;
    body.appendChild(para);
  });
  card.appendChild(body);
  div.appendChild(card);

  const btnWrap = document.createElement('div');
  btnWrap.className = 'buttons';
  slide.buttons.forEach(b => {
    const btn = document.createElement('button');
    btn.className = 'choice';
    btn.textContent = b.text;
    btn.addEventListener('click', () => goToSlide(b.target));
    btnWrap.appendChild(btn);
  });
  div.appendChild(btnWrap);

  stage.appendChild(div);
  return div;
}

function updateTimeline(state) {
  document.querySelectorAll('.tick').forEach(tick => {
    const year = tick.dataset.year;
    const isHistory = tick.classList.contains('history');
    tick.classList.remove('active', 'pulsing');
    if (!isHistory) tick.classList.remove('revealed');
    if (state.active && state.active.includes(year)) {
      tick.classList.add('active', 'revealed');
    }
    if (state.pulsing && state.pulsing.includes(year)) {
      tick.classList.add('active', 'pulsing', 'revealed');
    }
  });
}

function revealCard(slideEl) {
  const paras = slideEl.querySelectorAll('.card .body p');
  const buttons = slideEl.querySelector(':scope > .buttons');
  paras.forEach((p, i) => setTimeout(() => p.classList.add('shown'), 250 + i * 600));
  if (buttons) setTimeout(() => buttons.classList.add('shown'), 250 + paras.length * 600 + 200);
}

function showSlide(idx) {
  document.querySelectorAll('.slide').forEach(s => s.classList.remove('active'));
  const slide = SLIDES[idx];
  if (!slide) return;
  let el = document.getElementById(slide.id);
  if (!el) el = renderSlide(slide);
  el.querySelectorAll('.card .body p').forEach(p => p.classList.remove('shown'));
  const bw = el.querySelector(':scope > .buttons');
  if (bw) bw.classList.remove('shown');
  el.classList.add('active');
  updateTimeline(slide.timeline || {});
  counter.textContent = `${idx + 1} / ${SLIDES.length}`;
  setTimeout(() => revealCard(el), 200);
}

function goToSlide(target) {
  if (target === 'HOME') { window.location.href = HUB_HREF; return; }
  const idx = SLIDES.findIndex(s => s.id === target);
  if (idx === -1) return;
  showSlide(idx);
}

// Audio unlock + fade-in
const bgMusic = document.getElementById('bg-music');
let audioStarted = false;
function startMusic() {
  if (audioStarted || !bgMusic) return;
  audioStarted = true;
  bgMusic.volume = 0;
  bgMusic.play().then(() => {
    let v = 0;
    const fade = setInterval(() => {
      v += 0.03;
      if (v >= 0.45) { bgMusic.volume = 0.45; clearInterval(fade); }
      else bgMusic.volume = v;
    }, 100);
  }).catch(() => {});
}
document.addEventListener('click', startMusic, { once: true });
document.addEventListener('keydown', startMusic, { once: true });

showSlide(0);
</script>
